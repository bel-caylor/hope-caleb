<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Hope & Caleb | TV Slideshow</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="slideshow.css">
  </head>
  <body>
    <main class="tv-slideshow" aria-live="polite">
      <section class="slide is-active" data-slide>
        <div class="slide__message">
          <p class="slide__eyebrow">Hope & Caleb</p>
          <h1>Congratulations</h1>
          <p>Photos, videos, and notes from people who love you.</p>
        </div>
      </section>
    </main>

    <div class="tv-status" id="tvStatus">Loading memories...</div>
    <div class="tv-arrows" aria-label="Slideshow navigation">
      <button class="tv-arrow" type="button" data-slide-direction="previous" aria-label="Previous slide">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="m15 18-6-6 6-6"></path>
        </svg>
      </button>
      <button class="tv-arrow" type="button" data-slide-direction="next" aria-label="Next slide">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="m9 6 6 6-6 6"></path>
        </svg>
      </button>
    </div>
    <script src="slideshow.js"></script>
  </body>
</html>
